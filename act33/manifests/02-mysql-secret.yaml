# Secret con las credenciales de MySQL.
# Usamos stringData (texto plano legible); Kubernetes lo codifica en base64 al guardarlo.
# En producción NUNCA se versiona un Secret en git con contraseñas reales:
# se usa un gestor externo (AWS Secrets Manager, Sealed Secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: wordpress
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "rootpass123"
  MYSQL_DATABASE: "wordpress"
  MYSQL_USER: "wpuser"
  MYSQL_PASSWORD: "wppass123"
